<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTest CBT — Computer Based Test Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --text: #e8edf5;
    --muted: #6b7a96;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --correct: #22c55e;
    --wrong: #ef4444;
    --warn: #f59e0b;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ─── HOME SCREEN ─── */
  #home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
  }

  .tagline {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 56px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
    margin-bottom: 48px;
  }

  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .subject-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--card-color, #3b82f6), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .subject-card:hover::before { opacity: 0.08; }
  .subject-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .subject-card.selected {
    border-color: var(--card-color, var(--accent));
    background: var(--surface2);
    box-shadow: 0 0 0 2px var(--card-color, var(--accent));
  }

  .subject-card.selected::before { opacity: 0.12; }

  .subject-icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }

  .subject-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    position: relative;
    z-index: 1;
  }

  .subject-count {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }

  .check-badge {
    position: absolute;
    top: 12px; right: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--card-color, var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 2;
  }

  .subject-card.selected .check-badge { opacity: 1; transform: scale(1); }

  .settings-row {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .setting-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    min-width: 180px;
  }

  .setting-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .setting-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
    outline: none;
  }

  .start-btn {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px 56px;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    box-shadow: 0 8px 30px rgba(59,130,246,0.35);
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59,130,246,0.5); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── TEST SCREEN ─── */
  #test {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .test-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }

  .test-subject-badge {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 6px 14px;
    border-radius: 30px;
    border: 1.5px solid;
  }

  .progress-info {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .timer-display {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent2);
    background: var(--surface2);
    padding: 8px 20px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  .timer-display.warn { color: var(--warn); border-color: var(--warn); }
  .timer-display.danger { color: var(--wrong); border-color: var(--wrong); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .test-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    max-width: 760px;
    width: 100%;
    margin-bottom: 24px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .q-text {
    font-size: 1.15rem;
    line-height: 1.7;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 32px;
  }

  .options-list { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.15s;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(59,130,246,0.08);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(59,130,246,0.12);
  }

  .opt-letter {
    min-width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .option-btn.selected .opt-letter {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    max-width: 760px;
    width: 100%;
    justify-content: space-between;
  }

  .nav-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .submit-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    color: #fff;
    border-radius: 12px;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(34,197,94,0.45); }

  /* Question navigator */
  .q-navigator {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 760px;
    width: 100%;
    margin-bottom: 24px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .q-dot {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }

  .q-dot:hover { border-color: var(--accent); color: var(--accent); }
  .q-dot.answered { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--accent2); }
  .q-dot.current { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ─── RESULTS SCREEN ─── */
  #results {
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .results-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .score-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, transparent 0%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }

  .score-circle::before {
    content: '';
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--surface);
  }

  .score-pct {
    position: relative; z-index: 1;
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text);
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 800;
    margin-bottom: 8px;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    text-align: center;
    min-width: 120px;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .stat-lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .review-section { max-width: 760px; width: 100%; }

  .review-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }

  .review-item.correct-item { border-left: 4px solid var(--correct); }
  .review-item.wrong-item { border-left: 4px solid var(--wrong); }

  .review-q-num {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .review-q-text {
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--text);
  }

  .review-answers { display: flex; flex-direction: column; gap: 8px; }

  .review-opt {
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    border: 1.5px solid transparent;
  }

  .review-opt.correct-ans {
    background: rgba(34,197,94,0.1);
    border-color: var(--correct);
    color: var(--correct);
  }

  .review-opt.wrong-ans {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .review-opt .rl { font-weight: 700; flex-shrink: 0; }

  .explanation-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: rgba(59,130,246,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    color: var(--accent2);
    line-height: 1.6;
  }

  .explanation-box strong { display: block; margin-bottom: 4px; font-family: 'Syne', sans-serif; }

  .restart-btn {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px 56px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin: 32px 0;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(59,130,246,0.3);
  }

  .restart-btn:hover { transform: translateY(-2px); }

  /* Tooltip */
  .no-select-msg {
    color: var(--warn);
    font-size: 0.85rem;
    margin-top: 8px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .no-select-msg.show { opacity: 1; }

  /* Progress bar */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    width: 100%;
    position: sticky;
    top: 57px;
    z-index: 9;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    transition: width 0.4s ease;
  }

  /* ══════════════════════════════════════════
     RESPONSIVE BREAKPOINTS
     ══════════════════════════════════════════ */

  /* ── Large Desktop: 1280px+ ── */
  @media (min-width: 1280px) {
    #home { padding: 60px 40px; }
    .subjects-grid {
      grid-template-columns: repeat(4, 1fr);
      max-width: 1100px;
      gap: 20px;
    }
    .subject-card { padding: 28px 24px; }
    .subject-icon { font-size: 2.2rem; }
    .subject-name { font-size: 1rem; }
    .tagline { font-size: 1.05rem; margin-bottom: 60px; }
    .settings-row { gap: 20px; }
    .setting-group { min-width: 220px; }
    .start-btn { padding: 18px 72px; font-size: 1.2rem; }
    .question-card { padding: 48px 52px; }
    .q-text { font-size: 1.2rem; }
    .nav-row { max-width: 860px; }
    .q-navigator { max-width: 860px; }
    .review-section { max-width: 860px; }
    .score-circle { width: 180px; height: 180px; }
    .score-circle::before { width: 148px; height: 148px; }
    .score-pct { font-size: 2.5rem; }
  }

  /* ── Regular Desktop: 1024px – 1279px ── */
  @media (min-width: 1024px) and (max-width: 1279px) {
    .subjects-grid { grid-template-columns: repeat(4, 1fr); max-width: 960px; }
    .question-card { padding: 42px 46px; }
  }

  /* ── Tablet Landscape: 768px – 1023px ── */
  @media (min-width: 768px) and (max-width: 1023px) {
    #home { padding: 40px 24px; }
    .subjects-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .subject-card { padding: 20px 16px; }
    .subject-icon { font-size: 1.6rem; }
    .tagline { margin-bottom: 40px; font-size: 0.9rem; }
    .settings-row { gap: 12px; }
    .setting-group { min-width: 160px; }
    .start-btn { padding: 15px 48px; }
    .test-header { padding: 12px 20px; }
    .test-subject-badge { font-size: 0.85rem; padding: 5px 12px; }
    .progress-info { font-size: 0.8rem; }
    .timer-display { font-size: 1.1rem; padding: 7px 16px; }
    .test-body { padding: 28px 20px; }
    .question-card { padding: 32px 36px; }
    .q-text { font-size: 1.05rem; }
    .q-navigator { gap: 6px; padding: 14px; }
    .q-dot { width: 30px; height: 30px; font-size: 0.7rem; }
    .stats-row { gap: 12px; }
    .stat-box { padding: 16px 22px; min-width: 100px; }
    .stat-val { font-size: 1.5rem; }
  }

  /* ── Tablet Portrait: 600px – 767px ── */
  @media (min-width: 600px) and (max-width: 767px) {
    #home { padding: 32px 20px; }
    .subjects-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .subject-card { padding: 18px 16px; }
    .subject-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .subject-name { font-size: 0.88rem; }
    .subject-count { font-size: 0.74rem; }
    .tagline { font-size: 0.85rem; margin-bottom: 32px; }
    .settings-row { gap: 10px; }
    .setting-group { min-width: 140px; flex: 1; }
    .start-btn { padding: 14px 40px; font-size: 1rem; width: 100%; max-width: 360px; }
    .test-header { padding: 10px 16px; gap: 8px; }
    .test-subject-badge { font-size: 0.8rem; padding: 4px 10px; }
    .progress-info { display: none; }
    .timer-display { font-size: 1rem; padding: 6px 14px; }
    .test-body { padding: 20px 16px; }
    .question-card { padding: 24px 22px; border-radius: 16px; }
    .q-text { font-size: 1rem; }
    .option-btn { padding: 13px 16px; font-size: 0.9rem; }
    .opt-letter { width: 28px; height: 28px; font-size: 0.8rem; }
    .nav-row { gap: 8px; }
    .nav-btn, .submit-btn { padding: 11px 16px; font-size: 0.85rem; }
    .q-navigator { gap: 6px; padding: 12px; }
    .q-dot { width: 28px; height: 28px; font-size: 0.68rem; border-radius: 6px; }
    .stats-row { gap: 10px; }
    .stat-box { padding: 14px 18px; min-width: 90px; }
    .stat-val { font-size: 1.4rem; }
    .score-circle { width: 140px; height: 140px; }
    .score-circle::before { width: 114px; height: 114px; }
    .score-pct { font-size: 1.9rem; }
    .review-item { padding: 20px; }
    .review-q-text { font-size: 0.95rem; }
    .review-opt { font-size: 0.85rem; padding: 9px 12px; }
    .explanation-box { font-size: 0.83rem; }
  }

  /* ── Mobile Large: 480px – 599px ── */
  @media (min-width: 480px) and (max-width: 599px) {
    #home { padding: 28px 16px; }
    .subjects-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .subject-card { padding: 16px 14px; }
    .subject-icon { font-size: 1.4rem; margin-bottom: 7px; }
    .subject-name { font-size: 0.85rem; }
    .subject-count { font-size: 0.72rem; }
    .tagline { font-size: 0.8rem; margin-bottom: 28px; letter-spacing: 0.03em; }
    .settings-row { flex-direction: column; align-items: stretch; gap: 10px; width: 100%; max-width: 400px; }
    .setting-group { min-width: unset; }
    .start-btn { width: 100%; max-width: 400px; padding: 14px 20px; font-size: 1rem; }
    .test-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
    .test-subject-badge { font-size: 0.78rem; padding: 4px 10px; }
    .progress-info { display: none; }
    .timer-display { font-size: 0.95rem; padding: 6px 12px; }
    .test-body { padding: 16px 14px; }
    .question-card { padding: 20px 18px; border-radius: 14px; }

<body>

<!-- ══════════ HOME SCREEN ══════════ -->
<div id="home" class="screen active">
  <div class="logo">EduTest CBT</div>
  <div class="tagline">Computer Based Test · Secondary School</div>

  <div class="subjects-grid" id="subjectsGrid"></div>

  <div class="settings-row">
    <div class="setting-group">
      <div class="setting-label">Number of Questions</div>
      <select id="numQs">
        <option value="10">10 Questions</option>
        <option value="20" selected>20 Questions</option>
        <option value="40">40 Questions</option>
        <option value="60">60 Questions</option>
      </select>
    </div>
    <div class="setting-group">
      <div class="setting-label">Time Limit</div>
      <select id="timeLimit">
        <option value="15">15 Minutes</option>
        <option value="30" selected>30 Minutes</option>
        <option value="45">45 Minutes</option>
        <option value="60">60 Minutes</option>
        <option value="90">90 Minutes</option>
      </select>
    </div>
  </div>

  <button class="start-btn" id="startBtn" disabled>Select a Subject to Begin</button>
  <div class="no-select-msg" id="noSelectMsg">Please select at least one subject</div>
</div>

<!-- ══════════ TEST SCREEN ══════════ -->
<div id="test" class="screen">
  <div class="test-header">
    <div class="test-subject-badge" id="testSubjectBadge">Mathematics</div>
    <div class="progress-info" id="progressInfo">Question 1 of 20</div>
    <div class="timer-display" id="timerDisplay">30:00</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
  </div>
  <div class="test-body">
    <div class="q-navigator" id="qNavigator"></div>
    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">Question 1</div>
      <div class="q-text" id="qText"></div>
      <div class="options-list" id="optionsList"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
      <button class="submit-btn" id="submitBtn" onclick="confirmSubmit()">Submit Test ✓</button>
    </div>
  </div>
</div>

<!-- ══════════ RESULTS SCREEN ══════════ -->
<div id="results" class="screen">
  <div class="results-header">
    <div class="score-circle" id="scoreCircle">
      <div class="score-pct" id="scorePct">0%</div>
    </div>
    <div class="result-title" id="resultTitle">Well done!</div>
    <div style="color:var(--muted); font-size:0.9rem" id="resultSubtitle"></div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" style="color:var(--correct)" id="statCorrect">0</div>
      <div class="stat-lbl">Correct</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--wrong)" id="statWrong">0</div>
      <div class="stat-lbl">Wrong</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--muted)" id="statUnanswered">0</div>
      <div class="stat-lbl">Unanswered</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--accent2)" id="statTime">—</div>
      <div class="stat-lbl">Time Used</div>
    </div>
  </div>

  <div class="review-section" id="reviewSection"></div>
  <button class="restart-btn" onclick="goHome()">Start New Test</button>
</div>

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let selectedSubject = null;
let questions = [];
let userAnswers = [];
let currentQ = 0;
let timerInterval = null;
let secondsLeft = 0;
let totalSeconds = 0;
let secondsUsed = 0;

// ══════════════════════════════════════════════════════════
//  HOME SCREEN
// ══════════════════════════════════════════════════════════
function buildHome() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = '';
  SUBJECTS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.setProperty('--card-color', s.color);
    card.dataset.id = s.id;
    const count = QUESTION_BANK[s.id]?.length || 0;
    card.innerHTML = `
      <span class="subject-icon">${s.icon}</span>
      <div class="check-badge">✓</div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-count">${count} questions available</div>
    `;
    card.addEventListener('click', () => toggleSubject(s.id, card));
    grid.appendChild(card);
  });
}

function toggleSubject(id, card) {
  // Single select
  document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedSubject = id;

  const btn = document.getElementById('startBtn');
  btn.disabled = false;
  btn.textContent = '▶️  Start Test';
}

document.getElementById('startBtn').addEventListener('click', startTest);

function startTest() {
  if (!selectedSubject) {
    const msg = document.getElementById('noSelectMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
    return;
  }
  const numQs = parseInt(document.getElementById('numQs').value);
  const timeMins = parseInt(document.getElementById('timeLimit').value);

  const pool = [...(QUESTION_BANK[selectedSubject] || [])];
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  questions = pool.slice(0, Math.min(numQs, pool.length));
  if (questions.length === 0) return alert('No questions available for this subject.');

  userAnswers = new Array(questions.length).fill(null);
  currentQ = 0;
  secondsLeft = timeMins * 60;
  totalSeconds = secondsLeft;

  const subj = SUBJECTS.find(s => s.id === selectedSubject);
  const badge = document.getElementById('testSubjectBadge');
  badge.textContent = subj.name;
  badge.style.color = subj.color;
  badge.style.borderColor = subj.color;

  showScreen('test');
  buildNavigator();
  renderQuestion();
  startTimer();
}

// ══════════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) {
      secondsLeft = 0;
      clearInterval(timerInterval);
      autoSubmit();
    }
    updateTimerDisplay();
  }, 1000);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const el = document.getElementById('timerDisplay');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer-display';
  const ratio = secondsLeft / totalSeconds;
  if (ratio <= 0.1) el.classList.add('danger');
  else if (ratio <= 0.25) el.classList.add('warn');
}

// ══════════════════════════════════════════════════════════
//  QUESTION RENDERING
// ══════════════════════════════════════════════════════════
const LETTERS = ['A','B','C','D','E'];

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('qNumber').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('progressInfo').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('qText').textContent = q.q;

  const fill = ((currentQ + 1) / questions.length) * 100;
  document.getElementById('progressBarFill').style.width = fill + '%';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (userAnswers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span> <span>${opt}</span>`;
    btn.addEventListener('click', () => selectAnswer(i));
    list.appendChild(btn);
  });

  updateNavigator();

  // Scroll up
  document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectAnswer(i) {
  userAnswers[currentQ] = i;
  renderQuestion();
}

function navigate(dir) {
  const next = currentQ + dir;
  if (next < 0 || next >= questions.length) return;
  currentQ = next;
  renderQuestion();
}

// ══════════════════════════════════════════════════════════
//  NAVIGATOR
// ══════════════════════════════════════════════════════════
function buildNavigator() {
  const nav = document.getElementById('qNavigator');
  nav.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = i + 1;
    dot.addEventListener('click', () => { currentQ = i; renderQuestion(); });
    nav.appendChild(dot);
  });
}

function updateNavigator() {
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((dot, i) => {
    dot.className = 'q-dot';
    if (i === currentQ) dot.classList.add('current');
    else if (userAnswers[i] !== null) dot.classList.add('answered');
  });
}

// ══════════════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════════════
function confirmSubmit() {
  const unanswered = userAnswers.filter(a => a === null).length;
  if (unanswered > 0) {
    const ok = confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`);
    if (!ok) return;
  }
  submitTest();
}

function autoSubmit() {
  alert('Time is up! Your test has been submitted automatically.');
  submitTest();
}

function submitTest() {
  clearInterval(timerInterval);
  secondsUsed = totalSeconds - secondsLeft;
  showResults();
}

// ══════════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════════
function showResults() {
  let correct = 0, wrong = 0, unanswered = 0;
  questions.forEach((q, i) => {
    if (userAnswers[i] === null) unanswered++;
    else if (userAnswers[i] === q.ans) correct++;
    else wrong++;
  });

  const pct = Math.round((correct / questions.length) * 100);
  const subj = SUBJECTS.find(s => s.id === selectedSubject);

  // Score circle
  const circle = document.getElementById('scoreCircle');
  const deg = (pct / 100) * 360;
  circle.style.background = `conic-gradient(${subj.color} ${deg}deg, #1a2235 ${deg}deg)`;

  document.getElementById('scorePct').textContent = pct + '%';

  let title = 'Keep Practicing!';
  if (pct >= 80) title = 'Excellent! 🎉';
  else if (pct >= 60) title = 'Good Job! 👍';
  else if (pct >= 40) title = 'Fair Attempt';
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSubtitle').textContent = `${subj.name} · ${questions.length} Questions`;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statUnanswered').textContent = unanswered;

  const m = Math.floor(secondsUsed / 60), s = secondsUsed % 60;
  document.getElementById('statTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  // Review
  const section = document.getElementById('reviewSection');
  section.innerHTML = '<div class="review-title">Answer Review</div>';

  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua === q.ans;
    const item = document.createElement('div');
    item.className = `review-item ${ua === null ? '' : (isCorrect ? 'correct-item' : 'wrong-item')}`;
    item.style.animationDelay = (i * 0.04) + 's';

    let optsHTML = '';
    q.opts.forEach((opt, oi) => {
      let cls = '';
      if (oi === q.ans) cls = 'correct-ans';
      else if (oi === ua && !isCorrect) cls = 'wrong-ans';
      optsHTML += `<div class="review-opt ${cls}"><span class="rl">${LETTERS[oi]}.</span><span>${opt}</span></div>`;
    });

    const statusIcon = ua === null ? '⬜' : (isCorrect ? '✅' : '❌');
    const yourAns = ua !== null ? `Your answer: <strong>${LETTERS[ua]}. ${q.opts[ua]}</strong>` : 'Not answered';

    item.innerHTML = `
      <div class="review-q-num">${statusIcon} Question ${i + 1}</div>
      <div class="review-q-text">${q.q}</div>
      <div class="review-answers">${optsHTML}</div>
      <div class="explanation-box">
        <strong>💡 Explanation</strong>
        ${q.exp}<br><small style="opacity:0.7;margin-top:4px;display:block">${yourAns}</small>
      </div>
    `;
    section.appendChild(item);
  });

  showScreen('results');
}

// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  clearInterval(timerInterval);
  selectedSubject = null;
  document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'Select a Subject to Begin';
  showScreen('home');
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
buildHome();
</script>
